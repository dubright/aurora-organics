<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Aurora Organics</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, system-ui;
  background: #0b0d10;
  color: #eaeaea;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
aside {
  width: 240px;
  background: #0f1115;
  padding: 20px;
  border-right: 1px solid #1f2329;
}

.logo {
  font-weight: 700;
  margin-bottom: 20px;
  color: #00e676;
}

.nav-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: #aaa;
}

.nav-item.active {
  background: #1a1f26;
  color: #00e676;
}

/* MAIN */
main {
  flex: 1;
  display: flex;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

/* RIGHT PANEL */
.right {
  width: 320px;
  background: #0f1115;
  border-left: 1px solid #1f2329;
  padding: 20px;
}

/* TITLE */
h2 {
  margin-top: 0;
  font-weight: 600;
}

/* BUTTON */
.btn {
  background: #00e676;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

/* INPUT */
input {
  background: #15191f;
  border: 1px solid #2a2f36;
  padding: 8px;
  border-radius: 8px;
  color: white;
}

/* CARD */
.card {
  background: #11151a;
  padding: 16px;
  border-radius: 12px;
  margin-top: 12px;
  border: 1px solid #1c2127;
}

/* PROJECT */
.project-header {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* CULTIVO */
.cultivo {
  background: #15191f;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}
</style>
</head>

<body>

<aside>
  <div class="logo">🌿 Aurora</div>
  <div id="nav-dashboard" class="nav-item active">Dashboard</div>
  <div id="nav-projects" class="nav-item">Projetos</div>
</aside>

<main>
  <div id="root" class="content"></div>
  <div id="sidePanel" class="right"></div>
</main>

<script type="text/babel">
const { useState, useEffect } = React;

function App({ page }) {

  const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem("projects") || "[]"));
  const [expanded, setExpanded] = useState(null);
  const [forms, setForms] = useState({});

  useEffect(() => {
    localStorage.setItem("projects", JSON.stringify(projects));
  }, [projects]);

  const addProject = () => {
    const nome = prompt("Nome do projeto");
    if (!nome) return;

    setProjects(prev => [...prev, {
      id: Date.now(),
      nome,
      cultivos: [],
      historico: []
    }]);
  };

  const addCultivo = (id) => {
    const form = forms[id];
    if (!form?.planta || !form?.data) return alert("Preencha");

    const cultivo = { ...form, id: Date.now() };

    setProjects(prev =>
      prev.map(p =>
        p.id === id
          ? {
              ...p,
              cultivos: [...p.cultivos, cultivo],
              historico: [...p.historico, { acao: `Cultivo ${form.planta}` }]
            }
          : p
      )
    );

    setForms(prev => ({
      ...prev,
      [id]: { planta:"", data:"", quantidade:1 }
    }));
  };

  const Dashboard = () => {
    const total = projects.reduce((a,p)=>a+p.cultivos.length,0);
    return <div>
      <h2>Dashboard</h2>
      <div className="card">Total cultivos: {total}</div>
    </div>;
  };

  const Projetos = () => {

    const projetoAtual = projects.find(p => p.id === expanded);

    return (
      <div>
        <h2>Projetos</h2>
        <button className="btn" onClick={addProject}>+ Projeto</button>

        {projects.map(p => (
          <div key={p.id} className="card">

            <div className="project-header" onClick={() => setExpanded(p.id === expanded ? null : p.id)}>
              <strong>{p.nome}</strong>
              <span>{p.cultivos.length}</span>
            </div>

            {expanded === p.id && (
              <div>

                <div style={{display:"flex", gap:"6px", marginTop:"10px"}}>
                  <input
                    placeholder="Planta"
                    value={forms[p.id]?.planta || ""}
                    onChange={e =>
                      setForms(prev => ({
                        ...prev,
                        [p.id]: { ...prev[p.id], planta:e.target.value }
                      }))
                    }
                  />

                  <input
                    type="date"
                    value={forms[p.id]?.data || ""}
                    onChange={e =>
                      setForms(prev => ({
                        ...prev,
                        [p.id]: { ...prev[p.id], data:e.target.value }
                      }))
                    }
                  />

                  <input
                    type="number"
                    value={forms[p.id]?.quantidade || 1}
                    onChange={e =>
                      setForms(prev => ({
                        ...prev,
                        [p.id]: { ...prev[p.id], quantidade:e.target.value }
                      }))
                    }
                  />

                  <button className="btn" onClick={() => addCultivo(p.id)}>+</button>
                </div>

                {p.cultivos.map(c => (
                  <div key={c.id} className="cultivo">
                    {c.planta} • {c.quantidade}
                  </div>
                ))}

              </div>
            )}
          </div>
        ))}

        {ReactDOM.createPortal(
          <div>
            {projetoAtual ? (
              <>
                <h3>{projetoAtual.nome}</h3>
                <div>Cultivos: {projetoAtual.cultivos.length}</div>

                <h4>Histórico</h4>
                {projetoAtual.historico.map((h,i)=>(
                  <div key={i}>{h.acao}</div>
                ))}
              </>
            ) : "Selecione um projeto"}
          </div>,
          document.getElementById("sidePanel")
        )}

      </div>
    );
  };

  return page === "dashboard" ? <Dashboard/> : <Projetos/>;
}

// NAV
let page = "dashboard";
const root = ReactDOM.createRoot(document.getElementById("root"));

function render(){
  root.render(<App page={page} />);
}

document.getElementById("nav-dashboard").onclick = () => {
  page="dashboard";
  updateNav();
  render();
};

document.getElementById("nav-projects").onclick = () => {
  page="projects";
  updateNav();
  render();
};

function updateNav(){
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.getElementById("nav-"+page).classList.add("active");
}

render();
</script>

</body>
</html>
