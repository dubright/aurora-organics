<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Aurora Organics</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#111; color:#eee; display:flex; height:100vh; }
    aside { width:200px; background:#1a1a1a; padding:1rem; }
    button { cursor:pointer; }
    main { flex:1; display:flex; }
    .content { flex:1; padding:20px; overflow:auto; }
    .right { width:250px; background:#1a1a1a; padding:10px; }
    .card { background:#222; padding:10px; margin-bottom:10px; border-radius:8px; }
  </style>
</head>

<body>
  <aside>
    <button onclick="setPage('dashboard')">Dashboard</button><br><br>
    <button onclick="setPage('projects')">Projetos</button>
  </aside>

  <main>
    <div id="root" class="content"></div>
    <div id="sidePanel" class="right"></div>
  </main>

<script type="text/babel">
const { useState, useEffect } = React;

function App({ page }) {
  const [projects, setProjects] = useState(() => {
    return JSON.parse(localStorage.getItem("projects") || "[]");
  });

  const [expanded, setExpanded] = useState(null);
  const [forms, setForms] = useState({});

  useEffect(() => {
    localStorage.setItem("projects", JSON.stringify(projects));
  }, [projects]);

  // ======================
  // CRUD PROJETOS
  // ======================

  const addProject = () => {
    const nome = prompt("Nome do projeto:");
    if (!nome) return;

    const novo = {
      id: Date.now(),
      nome,
      cultivos: [],
      historico: []
    };

    setProjects(prev => [...prev, novo]);
  };

  const deleteProject = (id) => {
    setProjects(prev => prev.filter(p => p.id !== id));
    if (expanded === id) setExpanded(null);
  };

  // ======================
  // CULTIVOS
  // ======================

  const addCultivo = (projId) => {
    const form = forms[projId];

    if (!form || !form.planta || !form.data) {
      return alert("Preencha os campos");
    }

    const novoCultivo = {
      ...form,
      id: Date.now()
    };

    setProjects(prev =>
      prev.map(p =>
        p.id === projId
          ? {
              ...p,
              cultivos: [...p.cultivos, novoCultivo],
              historico: [...p.historico, { acao: "Cultivo adicionado" }]
            }
          : p
      )
    );

    // limpa form
    setForms(prev => ({
      ...prev,
      [projId]: { planta:"", data:"", quantidade:1 }
    }));
  };

  // ======================
  // UI
  // ======================

  function Dashboard() {
    const total = projects.reduce((a,p)=>a+p.cultivos.length,0);

    return (
      <div>
        <h2>Dashboard</h2>
        <div className="card">Total de cultivos: {total}</div>
      </div>
    );
  }

  function Projetos() {
    const projetoAtual = projects.find(p => p.id === expanded);

    return (
      <div>
        <h2>Projetos</h2>
        <button onClick={addProject}>+ Projeto</button>

        {projects.map(p => (
          <div key={p.id} className="card">

            <div onClick={() => setExpanded(p.id === expanded ? null : p.id)}>
              <strong>{p.nome}</strong> ({p.cultivos.length})
            </div>

            <button onClick={() => deleteProject(p.id)}>Excluir</button>

            {expanded === p.id && (
              <div>

                {/* FORM */}
                <input
                  placeholder="Planta"
                  value={forms[p.id]?.planta || ""}
                  onChange={e =>
                    setForms(prev => ({
                      ...prev,
                      [p.id]: {
                        ...prev[p.id],
                        planta: e.target.value
                      }
                    }))
                  }
                />

                <input
                  type="date"
                  value={forms[p.id]?.data || ""}
                  onChange={e =>
                    setForms(prev => ({
                      ...prev,
                      [p.id]: {
                        ...prev[p.id],
                        data: e.target.value
                      }
                    }))
                  }
                />

                <input
                  type="number"
                  value={forms[p.id]?.quantidade || 1}
                  onChange={e =>
                    setForms(prev => ({
                      ...prev,
                      [p.id]: {
                        ...prev[p.id],
                        quantidade: e.target.value
                      }
                    }))
                  }
                />

                <button onClick={() => addCultivo(p.id)}>Adicionar</button>

                {/* LISTA */}
                {p.cultivos.map(c => (
                  <div key={c.id} className="card">
                    {c.planta} - {c.quantidade}
                  </div>
                ))}

              </div>
            )}
          </div>
        ))}

        {/* SIDE PANEL */}
        {ReactDOM.createPortal(
          <div>
            {projetoAtual ? (
              <div>
                <h3>{projetoAtual.nome}</h3>
                <div>cultivos: {projetoAtual.cultivos.length}</div>

                <h4>Histórico</h4>
                {projetoAtual.historico.map((h,i)=>(
                  <div key={i}>{h.acao}</div>
                ))}
              </div>
            ) : "Selecione um projeto"}
          </div>,
          document.getElementById("sidePanel")
        )}
      </div>
    );
  }

  return page === "dashboard" ? <Dashboard/> : <Projetos/>;
}

// ======================
// RENDER GLOBAL
// ======================

let currentPage = "dashboard";

const root = ReactDOM.createRoot(document.getElementById("root"));

function renderApp(){
  root.render(<App page={currentPage} />);
}

function setPage(p){
  currentPage = p;
  renderApp();
}

renderApp();
</script>
</body>
</html>
