<script type="text/babel">

const { useState, useEffect } = React;

// ================= INTELIGÊNCIA =================

function analisarCultivo(c){
  const dias = Math.floor((new Date() - new Date(c.data)) / (1000*60*60*24));

  let recomendacao = "";
  let alerta = "";
  let fase = "";

  if(dias < 7){
    fase = "Germinação";
    recomendacao = "Manter solo úmido";
  } else if(dias < 30){
    fase = "Crescimento";
    recomendacao = "Adubar e regar regularmente";
  } else if(dias < 50){
    fase = "Floração";
    recomendacao = "Aumentar nutrientes";
  } else {
    fase = "Colheita";
    recomendacao = "Pronto para colher";
    alerta = "⚠️ Colheita disponível";
  }

  const progresso = Math.min((dias / 60) * 100, 100);

  return { dias, fase, recomendacao, alerta, progresso };
}

// ================= APP =================

function App({ page }) {

const [projects,setProjects] = useState(()=>JSON.parse(localStorage.getItem("projects")||"[]"));
const [active,setActive] = useState(null);
const [form,setForm] = useState({planta:"",data:"",quantidade:1});
const [toast,setToast] = useState("");

useEffect(()=>localStorage.setItem("projects",JSON.stringify(projects)),[projects]);

const showToast = msg => {
setToast(msg);
setTimeout(()=>setToast(""),2000);
};

// ================= PROJETOS =================

const addProject = nome => {
if(!nome) return;
setProjects(prev=>[...prev,{id:Date.now(),nome,cultivos:[],historico:[]}]);
showToast("Projeto criado");
};

// ================= CULTIVO =================

const addCultivo = () => {

if(!form.planta||!form.data) return alert("Preencha");

setProjects(prev=>prev.map(p=>
p.id===active
? {...p,
cultivos:[...p.cultivos,{...form,id:Date.now()}],
historico:[...p.historico,{acao:`Plantado ${form.planta}`}]
}
:p
));

setForm({planta:"",data:"",quantidade:1});
showToast("Cultivo adicionado");
};

const deleteCultivo = (id) => {
setProjects(prev=>prev.map(p=>
p.id===active
? {...p,cultivos:p.cultivos.filter(c=>c.id!==id)}
:p
));
};

// ================= DASHBOARD =================

const Dashboard = () => {
const all = projects.flatMap(p=>p.cultivos);
return (
<>
<h2>Dashboard Inteligente</h2>

<div className="card">
Cultivos ativos: {all.length}
</div>

<div className="card">
Alertas:
{all.filter(c=>analisarCultivo(c).alerta).map((c,i)=>(
<div key={i}>{c.planta} - colher</div>
))}
</div>

</>
);
};

// ================= PROJETOS =================

const projeto = projects.find(p=>p.id===active);

const Projetos = () => (
<>
<h2>Projetos</h2>

<input id="proj" placeholder="Novo projeto"/>
<button onClick={()=>{
addProject(document.getElementById("proj").value);
document.getElementById("proj").value="";
}}>Criar</button>

{projects.map(p=>(
<div key={p.id} className="card" onClick={()=>setActive(p.id)}>
{p.nome}
</div>
))}

{projeto && (
<div className="card">

<h3>{projeto.nome}</h3>

<input placeholder="Planta"
value={form.planta}
onChange={e=>setForm({...form,planta:e.target.value})}/>

<input type="date"
value={form.data}
onChange={e=>setForm({...form,data:e.target.value})}/>

<input type="number"
value={form.quantidade}
onChange={e=>setForm({...form,quantidade:e.target.value})}/>

<button onClick={addCultivo}>Adicionar</button>

{projeto.cultivos.map(c=>{
const info = analisarCultivo(c);

return (
<div key={c.id} className="card">

<strong>{c.planta}</strong>
<br/>

Fase: {info.fase}
<br/>

<div className="progress">
<div className="bar" style={{width:info.progresso+"%"}}></div>
</div>

<div>{info.recomendacao}</div>

{info.alerta && <div style={{color:"orange"}}>{info.alerta}</div>}

<button onClick={()=>deleteCultivo(c.id)}>Excluir</button>

</div>
);
})}

</div>
)}

{/* SIDE PANEL INTELIGENTE */}
{ReactDOM.createPortal(
projeto ? (
<div>
<h3>Tarefas do dia</h3>

{projeto.cultivos.map((c,i)=>{
const info = analisarCultivo(c);
return (
<div key={i} className="card">
<strong>{c.planta}</strong>
<br/>
{info.recomendacao}
</div>
);
})}

</div>
) : "Selecione um projeto",
document.getElementById("sidePanel")
)}

</>
);

return page==="dashboard"?<Dashboard/>:<Projetos/>;

}

// NAV
let page="dashboard";
const root=ReactDOM.createRoot(document.getElementById("root"));

function render(){ root.render(<App page={page}/>); }

document.getElementById("nav-dashboard").onclick=()=>{page="dashboard";update();};
document.getElementById("nav-projects").onclick=()=>{page="projects";update();};

function update(){
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
document.getElementById("nav-"+page).classList.add("active");
render();
}

render();

</script>
