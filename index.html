<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Aurora</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family:Inter; background:#0b0d10; color:#eee; display:flex; }
aside { width:240px; background:#0f1115; padding:20px; border-right:1px solid #222; }
main { flex:1; display:flex; }
.content { flex:1; padding:30px; }
.right { width:320px; background:#0f1115; padding:20px; border-left:1px solid #222; }

.nav { padding:10px; cursor:pointer; border-radius:8px; }
.nav.active { background:#1a1f26; color:#00e676; }

.card { background:#15191f; padding:16px; border-radius:12px; margin-top:12px; }

input { background:#1c2026; border:1px solid #333; padding:8px; border-radius:8px; color:white; width:100%; margin-bottom:8px; }

button { background:#00e676; border:none; padding:8px; border-radius:8px; cursor:pointer; width:100%; }

.progress { height:6px; background:#222; border-radius:4px; overflow:hidden; }
.bar { height:100%; background:#00e676; }

.alert { color:orange; font-size:12px; }
</style>
</head>

<body>

<aside>
<h3>🌿 Aurora</h3>
<div id="nav-dashboard" class="nav active">Dashboard</div>
<div id="nav-projects" class="nav">Projetos</div>
</aside>

<main>
<div id="root" class="content"></div>
<div id="sidePanel" class="right"></div>
</main>

<script type="text/babel">

const { useState, useEffect } = React;

// ================= INTELIGÊNCIA =================

function analisar(c){
const dias = Math.floor((new Date() - new Date(c.data)) / (1000*60*60*24));

let fase = "Germinação";
let recomendacao = "Manter solo úmido";
let alerta = "";

if(dias > 7){ fase="Crescimento"; recomendacao="Regar + adubar"; }
if(dias > 30){ fase="Floração"; recomendacao="Aumentar nutrientes"; }
if(dias > 50){ fase="Colheita"; recomendacao="Colher"; alerta="⚠️ Colheita atrasada"; }

return {
fase,
recomendacao,
alerta,
progresso: Math.min((dias/60)*100,100)
};
}

// ================= APP =================

function App({ page }) {

const [projects,setProjects] = useState(()=>JSON.parse(localStorage.getItem("projects")||"[]"));
const [active,setActive] = useState(null);
const [form,setForm] = useState({planta:"",data:"",quantidade:1});

useEffect(()=>localStorage.setItem("projects",JSON.stringify(projects)),[projects]);

// ================= PROJETO =================

const addProject = nome => {
if(!nome) return;
setProjects(prev=>[...prev,{id:Date.now(),nome,cultivos:[]}]);
};

// ================= CULTIVO =================

const addCultivo = () => {
if(!form.planta||!form.data) return;

setProjects(prev=>prev.map(p=>
p.id===active
? {...p,cultivos:[...p.cultivos,{...form,id:Date.now()}]}
:p
));

setForm({planta:"",data:"",quantidade:1});
};

const deleteCultivo = id => {
setProjects(prev=>prev.map(p=>
p.id===active
? {...p,cultivos:p.cultivos.filter(c=>c.id!==id)}
:p
));
};

const projeto = projects.find(p=>p.id===active);

// ================= DASHBOARD =================

const Dashboard = () => {

const all = projects.flatMap(p=>p.cultivos);

return (
<>
<h2>Operação</h2>

<div className="card">
Cultivos ativos: {all.length}
</div>

<div className="card">
Tarefas críticas:
{all.map((c,i)=>{
const info = analisar(c);
return info.alerta ? <div key={i}>{c.planta} - colher</div> : null;
})}
</div>

</>
);
};

// ================= PROJETOS =================

const Projetos = () => (
<>
<h2>Projetos</h2>

<input placeholder="Novo projeto" id="proj"/>
<button onClick={()=>{
addProject(document.getElementById("proj").value);
document.getElementById("proj").value="";
}}>
Criar projeto
</button>

{projects.map(p=>(
<div key={p.id} className="card" onClick={()=>setActive(p.id)}>
{p.nome}
</div>
))}

{projeto && (
<div className="card">

<h3>{projeto.nome}</h3>

<input placeholder="Planta"
value={form.planta}
onChange={e=>setForm({...form,planta:e.target.value})}
/>

<input type="date"
value={form.data}
onChange={e=>setForm({...form,data:e.target.value})}
/>

<input type="number"
value={form.quantidade}
onChange={e=>setForm({...form,quantidade:e.target.value})}
/>

<button onClick={addCultivo}>Adicionar cultivo</button>

{projeto.cultivos.map(c=>{
const info = analisar(c);

return (
<div key={c.id} className="card">

<strong>{c.planta}</strong>
<div>{info.fase}</div>

<div className="progress">
<div className="bar" style={{width:info.progresso+"%"}}></div>
</div>

<div>{info.recomendacao}</div>

{info.alerta && <div className="alert">{info.alerta}</div>}

<button onClick={()=>deleteCultivo(c.id)}>Excluir</button>

</div>
);
})}

</div>
)}

{ReactDOM.createPortal(
projeto
? <div>
<h3>Tarefas do dia</h3>
{projeto.cultivos.map((c,i)=>{
const info = analisar(c);
return <div key={i} className="card">{c.planta}<br/>{info.recomendacao}</div>;
})}
</div>
: "Selecione um projeto",
document.getElementById("sidePanel")
)}

</>
);

return page==="dashboard"?<Dashboard/>:<Projetos/>;

}

// NAV
let page="dashboard";
const root=ReactDOM.createRoot(document.getElementById("root"));

function render(){ root.render(<App page={page}/>); }

document.getElementById("nav-dashboard").onclick=()=>{page="dashboard";update();};
document.getElementById("nav-projects").onclick=()=>{page="projects";update();};

function update(){
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
document.getElementById("nav-"+page).classList.add("active");
render();
}

render();

</script>

</body>
</html>
