<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Aurora</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family:Inter; background:#0b0d10; color:#eee; display:flex; }
aside { width:220px; background:#0f1115; padding:20px; }
main { flex:1; display:flex; }
.content { flex:1; padding:30px; }
.right { width:300px; background:#0f1115; border-left:1px solid #222; padding:20px; }

.nav { padding:10px; cursor:pointer; border-radius:8px; color:#aaa; }
.nav.active { background:#1a1f26; color:#00e676; }

.card { background:#15191f; padding:16px; border-radius:12px; margin-top:12px; }

input { background:#1c2026; border:1px solid #333; padding:8px; border-radius:8px; color:white; }

button { background:#00e676; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; }

.progress { height:6px; background:#222; border-radius:4px; overflow:hidden; margin-top:5px; }
.bar { height:100%; background:#00e676; }
.toast {
  position:fixed; bottom:20px; right:20px;
  background:#00e676; color:#000;
  padding:10px 15px; border-radius:8px;
}
</style>
</head>

<body>

<aside>
  <h3>🌿 Aurora</h3>
  <div id="nav-dashboard" class="nav active">Dashboard</div>
  <div id="nav-projects" class="nav">Projetos</div>
</aside>

<main>
  <div id="root" class="content"></div>
  <div id="sidePanel" class="right"></div>
</main>

<script type="text/babel">

const { useState, useEffect } = React;

const fases = [
{nome:"Germinação",dias:7},
{nome:"Crescimento",dias:30},
{nome:"Floração",dias:50},
{nome:"Colheita",dias:60}
];

function getFase(dias){
if(dias<7) return "Germinação";
if(dias<30) return "Crescimento";
if(dias<50) return "Floração";
return "Colheita";
}

function App({ page }) {

const [projects,setProjects] = useState(()=>JSON.parse(localStorage.getItem("projects")||"[]"));
const [active,setActive] = useState(null);
const [form,setForm] = useState({planta:"",data:"",quantidade:1});
const [toast,setToast] = useState("");

useEffect(()=>localStorage.setItem("projects",JSON.stringify(projects)),[projects]);

const showToast = msg => {
setToast(msg);
setTimeout(()=>setToast(""),2000);
};

const addProject = nome => {
if(!nome) return;
setProjects(prev=>[...prev,{id:Date.now(),nome,cultivos:[],historico:[]}]);
showToast("Projeto criado");
};

const addCultivo = () => {
if(!form.planta||!form.data) return alert("Preencha");

setProjects(prev=>prev.map(p=>
p.id===active
? {...p,
cultivos:[...p.cultivos,{...form,id:Date.now(),historico:[]}],
historico:[...p.historico,{acao:`Plantado ${form.planta}`}]
}
:p
));

setForm({planta:"",data:"",quantidade:1});
showToast("Cultivo adicionado");
};

const deleteCultivo = (id) => {
setProjects(prev=>prev.map(p=>
p.id===active
? {...p,cultivos:p.cultivos.filter(c=>c.id!==id)}
:p
));
};

const projeto = projects.find(p=>p.id===active);

const Dashboard = () => {
const total = projects.flatMap(p=>p.cultivos).length;
return <div><h2>Dashboard</h2><div className="card">{total} cultivos</div></div>;
};

const Projetos = () => (
<>
<h2>Projetos</h2>

<input id="projName" placeholder="Novo projeto"/>
<button onClick={()=>{
const val=document.getElementById("projName").value;
addProject(val);
document.getElementById("projName").value="";
}}>Criar</button>

{projects.map(p=>(
<div key={p.id} className="card" onClick={()=>setActive(p.id)}>
{p.nome}
</div>
))}

{projeto && (
<div className="card">

<h3>{projeto.nome}</h3>

<input placeholder="Planta" value={form.planta}
onChange={e=>setForm({...form,planta:e.target.value})}/>

<input type="date" value={form.data}
onChange={e=>setForm({...form,data:e.target.value})}/>

<input type="number" value={form.quantidade}
onChange={e=>setForm({...form,quantidade:e.target.value})}/>

<button onClick={addCultivo}>Adicionar</button>

{projeto.cultivos.map(c=>{
const dias=Math.floor((new Date()-new Date(c.data))/(1000*60*60*24));
const fase=getFase(dias);
const prog=Math.min((dias/60)*100,100);

return (
<div key={c.id} className="card">
<strong>{c.planta}</strong> • {fase}
<div className="progress"><div className="bar" style={{width:prog+"%"}}></div></div>
<button onClick={()=>deleteCultivo(c.id)}>Excluir</button>
</div>
);
})}

</div>
)}

{ReactDOM.createPortal(
projeto
? <div>
<h3>{projeto.nome}</h3>
<div>Cultivos: {projeto.cultivos.length}</div>
</div>
: "Selecione um projeto",
document.getElementById("sidePanel")
)}

</>
);

return page==="dashboard"?<Dashboard/>:<Projetos/>;

}

let page="dashboard";
const root=ReactDOM.createRoot(document.getElementById("root"));

function render(){ root.render(<App page={page}/>); }

document.getElementById("nav-dashboard").onclick=()=>{page="dashboard";update();};
document.getElementById("nav-projects").onclick=()=>{page="projects";update();};

function update(){
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
document.getElementById("nav-"+page).classList.add("active");
render();
}

render();

</script>

</body>
</html>
