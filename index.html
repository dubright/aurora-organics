<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Aurora Organics</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family:Inter; background:#0b0d10; color:#eee; display:flex; height:100vh; }
aside { width:240px; background:#0f1115; padding:20px; }
main { flex:1; display:flex; }
.content { flex:1; padding:20px; overflow:auto; }
.right { width:300px; background:#0f1115; padding:20px; border-left:1px solid #222; }

.nav { padding:10px; cursor:pointer; border-radius:8px; color:#aaa; }
.nav.active { background:#1a1f26; color:#00e676; }

.card { background:#15191f; padding:12px; border-radius:10px; margin-top:10px; }
input, select { background:#1c2026; border:1px solid #333; padding:6px; border-radius:6px; color:#fff; }
button { background:#00e676; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; }
</style>
</head>

<body>

<aside>
  <h3>🌿 Aurora</h3>
  <div id="nav-dashboard" class="nav active">Dashboard</div>
  <div id="nav-projects" class="nav">Projetos</div>
</aside>

<main>
  <div id="root" class="content"></div>
  <div id="sidePanel" class="right"></div>
</main>

<script type="text/babel">

const { useState, useEffect } = React;

function App({ page }) {

const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem("projects") || "[]"));
const [activeProject, setActiveProject] = useState(null);
const [forms, setForms] = useState({});

useEffect(()=>{
localStorage.setItem("projects", JSON.stringify(projects));
},[projects]);

// ===================
// PROJETOS
// ===================

const addProject = () => {
const nome = prompt("Nome do projeto");
if(!nome) return;

setProjects(prev => [...prev,{
id:Date.now(),
nome,
cultivos:[],
historico:[]
}]);
};

const deleteProject = (id) => {
setProjects(prev => prev.filter(p=>p.id!==id));
if(activeProject===id) setActiveProject(null);
};

// ===================
// CULTIVO
// ===================

const addCultivo = (projId) => {

const form = forms[projId];
if(!form?.planta || !form?.data) return alert("Preencha");

const cultivo = {
id:Date.now(),
...form,
status:"Plantado",
historico:[]
};

setProjects(prev => prev.map(p =>
p.id===projId ? {
...p,
cultivos:[...p.cultivos, cultivo],
historico:[...p.historico,{acao:`Plantado ${form.planta}`}]
}:p
));

setForms(prev => ({
...prev,
[projId]:{planta:"",data:"",fertilizante:"BioBizz",litragem:"700ml",quantidade:1}
}));

};

const updateStatus = (projId, cultId, status) => {

setProjects(prev => prev.map(p =>
p.id===projId ? {
...p,
cultivos:p.cultivos.map(c =>
c.id===cultId ? {...c,status} : c
),
historico:[...p.historico,{acao:`Status atualizado: ${status}`}]
}:p
));

};

// ===================
// DASHBOARD
// ===================

const Dashboard = () => {

const all = projects.flatMap(p=>p.cultivos);
const total = all.length;
const qtd = all.reduce((a,b)=>a+Number(b.quantidade||0),0);
const lucro = qtd*10;
const custo = qtd*4;

return (
<>
<h2>Dashboard</h2>
<div className="card">Cultivos: {total}</div>
<div className="card">Produção: {qtd}</div>
<div className="card">Lucro: R$ {lucro}</div>
<div className="card">Custo: R$ {custo}</div>
</>
);
};

// ===================
// PROJETOS UI
// ===================

const Projetos = () => {

const projeto = projects.find(p=>p.id===activeProject);

return (
<>
<h2>Projetos</h2>
<button onClick={addProject}>+ Projeto</button>

{projects.map(p => (
<div key={p.id} className="card">
<div onClick={()=>setActiveProject(p.id)}>
<strong>{p.nome}</strong>
</div>
<button onClick={()=>deleteProject(p.id)}>Excluir</button>
</div>
))}

{projeto && (
<div className="card">

<h3>{projeto.nome}</h3>

<div>
<input placeholder="Planta"
value={forms[projeto.id]?.planta||""}
onChange={e=>setForms(prev=>({...prev,[projeto.id]:{...prev[projeto.id],planta:e.target.value}}))}
 />

<input type="date"
value={forms[projeto.id]?.data||""}
onChange={e=>setForms(prev=>({...prev,[projeto.id]:{...prev[projeto.id],data:e.target.value}}))}
 />

<input type="number"
value={forms[projeto.id]?.quantidade||1}
onChange={e=>setForms(prev=>({...prev,[projeto.id]:{...prev[projeto.id],quantidade:e.target.value}}))}
 />

<button onClick={()=>addCultivo(projeto.id)}>Adicionar</button>
</div>

{projeto.cultivos.map(c=>(
<div key={c.id} className="card">
<strong>{c.planta}</strong> ({c.status})

<select value={c.status} onChange={e=>updateStatus(projeto.id,c.id,e.target.value)}>
<option>Plantado</option>
<option>Crescimento</option>
<option>Colheita</option>
<option>Finalizado</option>
</select>

</div>
))}

</div>
)}

{ReactDOM.createPortal(
projeto ? (
<div>
<h3>Painel</h3>
<div>Cultivos: {projeto.cultivos.length}</div>

<h4>Histórico</h4>
{projeto.historico.map((h,i)=><div key={i}>{h.acao}</div>)}
</div>
) : "Selecione um projeto",
document.getElementById("sidePanel")
)}

</>
);
};

return page==="dashboard" ? <Dashboard/> : <Projetos/>;

}

// NAV
let page="dashboard";
const root=ReactDOM.createRoot(document.getElementById("root"));

function render(){ root.render(<App page={page}/>); }

document.getElementById("nav-dashboard").onclick=()=>{page="dashboard";update();};
document.getElementById("nav-projects").onclick=()=>{page="projects";update();};

function update(){
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
document.getElementById("nav-"+page).classList.add("active");
render();
}

render();

</script>

</body>
</html>
